name: Release

on:
  workflow_dispatch:  # Manual trigger only until repo settings allow PR creation

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.releases_created == 'true'
    environment:
      name: pypi
      url: https://pypi.org/project/autogenesis/
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Build all packages
        run: |
          for pkg in packages/*/pyproject.toml; do
            pkg_name=$(python3 -c "import tomllib; print(tomllib.load(open('$pkg','rb'))['project']['name'])")
            echo "::group::Building ${pkg_name}"
            uv build --package "${pkg_name}" --out-dir dist/
            echo "::endgroup::"
          done

      - name: Publish to PyPI via OIDC trusted publishing
        uses: pypa/gh-action-pypi-publish@106e0b0b7c337fa67ed433972f777c6357f78598 # v1.13.0
        with:
          packages-dir: dist/
