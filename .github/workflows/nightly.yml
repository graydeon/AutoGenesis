name: Nightly

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  UV_CACHE_DIR: /tmp/.uv-cache
  MAX_NIGHTLY_COST_USD: "5.0"
  AUTOGENESIS_MOCK_LLM: "1"

jobs:
  # ---------- same CI jobs ----------

  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check packages/

      - name: Ruff format check
        run: uv run ruff format --check packages/

      - name: Mypy strict type check
        run: uv run mypy packages/

  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests with coverage
        run: |
          uv run pytest packages/*/tests/ \
            -v --tb=short \
            --cov --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-format]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Dependency vulnerability scan
        run: uv run pip-audit

      - name: Bandit security lint (via ruff)
        run: uv run ruff check --select S packages/

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Build all packages
        run: |
          for pkg in packages/*/; do
            echo "::group::Building ${pkg}"
            uv build --package "$(basename "${pkg}")" --out-dir dist/
            echo "::endgroup::"
          done

      - name: Verify wheel installs in fresh venv
        run: |
          uv venv /tmp/test-venv
          for whl in dist/*.whl; do
            echo "Installing ${whl}..."
            /tmp/test-venv/bin/pip install "${whl}" --force-reinstall --no-deps
          done

  # ---------- nightly-only jobs ----------

  prompt-regression:
    name: Prompt Regression Tests
    runs-on: ubuntu-latest
    needs: [lint-and-format]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run golden prompt tests
        run: |
          if [ -d "prompts/" ] && [ -f "scripts/test_prompts.py" ]; then
            uv run python scripts/test_prompts.py
          else
            echo "::warning::Prompt regression test script not found — skipping."
            echo "Create scripts/test_prompts.py to enable golden prompt tests."
          fi

  token-efficiency-benchmark:
    name: Token Efficiency Benchmark
    runs-on: ubuntu-latest
    needs: [lint-and-format]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run token benchmark
        run: |
          if [ -f "scripts/benchmark.py" ]; then
            uv run python scripts/benchmark.py --max-cost "${MAX_NIGHTLY_COST_USD}"
          else
            echo "::warning::Benchmark script not found — skipping."
            echo "Create scripts/benchmark.py to enable token efficiency benchmarks."
          fi

      - name: Check for regression
        run: |
          if [ -f "benchmark-results.json" ]; then
            uv run python -c "
          import json, sys
          results = json.load(open('benchmark-results.json'))
          regression = results.get('regression_pct', 0)
          if regression > 10:
              print(f'::error::Token efficiency regression of {regression:.1f}% exceeds 10% threshold')
              sys.exit(1)
          print(f'Token efficiency change: {regression:+.1f}% (within threshold)')
          "
          else
            echo "No benchmark results file found — skipping regression check."
          fi
