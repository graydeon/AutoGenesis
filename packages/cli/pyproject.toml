[project]
name = "autogenesis-cli"
version = "0.1.0"
description = "AutoGenesis CLI application"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "autogenesis-core",
    "autogenesis-tools",
    "typer>=0.12",
    "rich>=13.0",
]

[project.scripts]
autogenesis = "autogenesis_cli.app:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.8",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autogenesis_cli"]
