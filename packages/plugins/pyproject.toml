[project]
name = "autogenesis-plugins"
version = "0.1.0"
description = "AutoGenesis plugin architecture and built-in plugins"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "autogenesis-core",
    "autogenesis-tools",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.8",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autogenesis_plugins"]
