[project]
name = "autogenesis-mcp"
version = "0.1.0"
description = "AutoGenesis MCP client, server, and registry"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "autogenesis-core",
    "mcp>=1.0",
    "fastmcp>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.8",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autogenesis_mcp"]
